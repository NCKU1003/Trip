<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>均的專屬二日遊行程</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 引入動畫庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-color: #f4f1ee;
            --card-bg: rgba(255, 255, 255, 0.9);
            --line-color: #d1d8d8;
            --accent-color: #6d5d4e;
            --accent-soft: #a08a78;
            --text-main: #3d3a36;
            --text-sub: #7a736c;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .timeline-container {
            width: 100%;
            max-width: 480px;
            padding: 50px 20px;
            position: relative;
        }

        /* 頂部設計優化 */
        .header {
            padding-left: 20px;
            margin-bottom: 40px;
            border-left: 4px solid var(--accent-color);
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            margin: 0;
            color: var(--accent-color);
        }

        .header p {
            color: var(--text-sub);
            margin: 8px 0 0;
            font-size: 0.9rem;
        }

        /* 天數選擇器切換為膠囊造型 */
        .day-selector {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 40px;
            position: sticky;
            top: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .day-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-sub);
        }

        .day-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(109, 93, 78, 0.3);
        }

        /* 時間軸線條 */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 35px;
            top: 150px;
            bottom: 50px;
            width: 2px;
            background: linear-gradient(to bottom, var(--line-color) 0%, transparent 100%);
        }

        /* 卡片升級 */
        .itinerary-item {
            position: relative;
            margin-bottom: 45px;
            padding-left: 50px;
            display: none;
            animation: fadeInUp 0.6s ease forwards;
        }

        .itinerary-item.active { display: block; }

        .itinerary-item::before {
            content: '';
            position: absolute;
            left: 29px;
            top: 6px;
            width: 14px;
            height: 14px;
            background: var(--bg-color);
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            z-index: 2;
        }

        .time {
            font-size: 0.8rem;
            color: var(--accent-soft);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.3s ease;
        }

        .card:active { transform: scale(0.98); }

        .location {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2c2926;
        }

        .tag {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(140, 118, 98, 0.1);
            color: var(--accent-color);
            font-size: 0.7rem;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        /* 圖片滾動區優化 */
        .image-scroller {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin: 15px -5px;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .image-scroller img {
            flex: 0 0 75%;
            height: 180px;
            object-fit: cover;
            border-radius: 16px;
            background: #ddd;
        }

        /* 按鈕視覺優化 */
        .nav-links-container {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .nav-link {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .nav-link.backup-link {
            background: white;
            border: 1px dashed var(--accent-soft);
            color: var(--accent-soft);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="timeline-container">
        <header class="header">
            <h1>台南・高雄</h1>
            <p><i class="far fa-calendar-alt"></i> 2026.01.24 ・ 均的專屬旅行</p>
        </header>

        <div class="day-selector">
            <div class="day-btn active" onclick="showDay(1)">DAY 01</div>
            <div class="day-btn" onclick="showDay(2)">DAY 02</div>
        </div>

        <!-- 範例卡片：Day 1 -->
        <div class="itinerary-item day1 active">
            <div class="time"><i class="far fa-clock"></i> 12:00 PM</div>
            <div class="card">
                <span class="tag">必吃美食</span>
                <div class="location">第二站：鴨肉珍</div>
                <div class="description">這間真的好吃，沒在開玩笑。</div>
                <div class="image-scroller">
                    <img src="pic/13.jpg" alt="美食照">
                    <img src="pic/14.jpg" alt="美食照">
                </div>
                <a href="https://maps.app.goo.gl/hzQZMbipdtLBp5KJ7" target="_blank" class="nav-link">
                    <i class="fas fa-map-marked-alt"></i> 導航去吃飯
                </a>
            </div>
        </div>

        <!-- 範例卡片：警告/趣味型 -->
        <div class="itinerary-item day1 active">
            <div class="time"><i class="far fa-clock"></i> 13:45 PM</div>
            <div class="card" style="background: linear-gradient(135deg, #fff 0%, #fff5f5 100%); border-left: 4px solid #ff7675;">
                <div class="location">直接走到駁二我不管</div>
                <div class="description" style="color: #d63031; font-weight: 700;">⚠ 這是命令，不得反抗！</div>
            </div>
        </div>

        <!-- ... 其他項目依此類推 ... -->

    </div>

    <script>
        function showDay(dayNum) {
            // 切換按鈕
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // 切換內容並觸發動畫
            const allItems = document.querySelectorAll('.itinerary-item');
            allItems.forEach(item => {
                item.style.display = 'none';
                if (item.classList.contains('day' + dayNum)) {
                    item.style.display = 'block';
                    // 重置動畫
                    item.style.animation = 'none';
                    item.offsetHeight; 
                    item.style.animation = null;
                }
            });
        }
    </script>
</body>
</html>
